secret:
  jwt:
    access:
      key: ${ACCESS_TOKEN_KEY}
      expired-in: 3600000
    refresh:
      key: ${REFRESH_TOKEN_KEY}
      expired-in: 1209600000

logging:
  level:
    org.hibernate.SQL: debug                      # INSERT, SELECT 쿼리 출력
    org.hibernate.type.descriptor.sql: trace      # ?에 들어가는 실제 값까지 출력 # 바인딩 파라미터 값까지 보고 싶으면
